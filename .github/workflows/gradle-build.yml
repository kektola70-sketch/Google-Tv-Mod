name: Build (Gradle)

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'
          cache: 'gradle'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Ensure Gradle wrapper exists (create if missing)
        run: |
          if [ ! -f ./gradlew ]; then
            echo "Gradle wrapper not found — downloading Gradle 6.8.3 and creating wrapper..."
            sudo apt-get update
            sudo apt-get install -y unzip curl
            curl -sSLo gradle-6.8.3-bin.zip https://services.gradle.org/distributions/gradle-6.8.3-bin.zip
            unzip -q gradle-6.8.3-bin.zip -d gradle
            export PATH="$(pwd)/gradle/gradle-6.8.3/bin:$PATH"
            gradle wrapper --gradle-version 6.8.3
          else
            echo "Gradle wrapper found."
          fi
          chmod +x ./gradlew

      - name: Build (Gradle)
        run: ./gradlew clean build --no-daemon

      - name: Upload build artifact (jar)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: google-tv-mod-jar
          path: build/libs/*.jar
