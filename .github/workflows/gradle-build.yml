name: Build (Gradle) with diagnostics

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print environment / java
        run: |
          echo "=== java version ==="
          java -version || true
          echo "=== ls project root ==="
          ls -la
          echo "=== ls src ==="
          ls -la src || true

      - name: Set up JDK 8 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'
          cache: 'gradle'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Force Gradle wrapper version 7.3.3
        run: |
          if [ -f gradle/wrapper/gradle-wrapper.properties ]; then
            sed -i 's|^distributionUrl=.*|distributionUrl=https\://services.gradle.org/distributions/gradle-7.3.3-bin.zip|' gradle/wrapper/gradle-wrapper.properties
          fi

      - name: Ensure Gradle wrapper exists (download Gradle if missing)
        run: |
          set -e
          if [ -f ./gradlew ]; then
            echo "Gradle wrapper found."
            chmod +x ./gradlew
          else
            echo "Gradle wrapper not found — downloading Gradle 7.3.3 and creating wrapper..."
            sudo apt-get update -y
            sudo apt-get install -y unzip curl
            curl -sSLo gradle-7.3.3-bin.zip https://services.gradle.org/distributions/gradle-7.3.3-bin.zip
            unzip -q gradle-7.3.3-bin.zip -d gradle
            export PATH="$(pwd)/gradle/gradle-7.3.3/bin:$PATH"
            gradle wrapper --gradle-version 7.3.3
            chmod +x ./gradlew
          fi

      - name: Debug: print gradle and env
        run: |
          echo "=== which gradle ==="
          which gradle || true
          echo "=== ./gradlew --version ==="
          ./gradlew --version || true

      - name: Build (Gradle) - run and save log
        id: build
        run: |
          set -o pipefail
          mkdir -p build-logs
          ./gradlew clean build --no-daemon --stacktrace --info 2>&1 | tee build-logs/build.log
        continue-on-error: true

      - name: Show last lines of build log
        if: always()
        run: |
          echo "=== BUILD LOG TAIL ==="
          tail -n 200 build-logs/build.log || true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: build-logs/build.log
          if-no-files-found: ignore

      - name: Upload build artifact (jar) if exists
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: google-tv-mod-jar
          path: "build/libs/*.jar"
          if-no-files-found: ignore

      - name: Fail job if build failed
        if: steps.build.outcome == 'failure'
        run: exit 1
